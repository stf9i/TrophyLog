async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json", "Prefer": opts.prefer || "", ...(opts.headers||{}) }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

async function loadCatches() {
  try {
    const rows = await sbFetch("/rest/v1/catches?select=*&order=date.desc");
    const data = rows.map(r => ({ id: r.id, species: r.species, length: r.length, water: r.water, weight: r.weight, bait: r.bait, photo: r.photo, date: r.date, season: r.season, angler: r.angler || "" }));
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
    return data;
  } catch(e) {
    console.warn("Supabase offline:", e.message);
    try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; } catch { return []; }
  }
}

async function saveCatches(catches) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(catches)); } catch {}
  try {
    await sbFetch("/rest/v1/catches", {
      method: "POST", prefer: "resolution=merge-duplicates",
      body: JSON.stringify(catches.map(c => ({ id: c.id, species: c.species, length: c.length, water: c.water, weight: c.weight||null, bait: c.bait||null, photo: c.photo||null, date: c.date, season: c.season, angler: c.angler||"" })))
    });
  } catch(e) { console.warn("Supabase save failed:", e.message); }
}

async function deleteCatchDB(id) {
  try { await sbFetch("/rest/v1/catches?id=eq." + id, { method: "DELETE" }); } catch {}
}

// ─── STATUS BADGE ──────────────────────────────────────────────────────────────
function StatusBadge({ status, size = "sm" }) {
  const cfg = STATUS_CONFIG[status];
  const isLg = size === "lg";
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: isLg ? 6 : 4,
      padding: isLg ? "5px 12px" : "3px 8px",
      borderRadius: 20, fontSize: isLg ? 13 : 11, fontWeight: 700,
      background: cfg.bg, color: cfg.text,
      border: `1px solid ${cfg.borderColor}`,
      fontFamily: "'Crimson Pro', Georgia, serif", letterSpacing: "0.03em"
    }}>
      {cfg.icon} {cfg.label}
    </span>
  );
}

  // Gallery / filter / sort state
  const [galleryFilter, setGalleryFilter] = useState({ species: "all", minLen: "", maxLen: "", season: "all", sort: "newest" });
  const [lightboxPhoto, setLightboxPhoto] = useState(null); // {src, catch}

  const currentSeason = new Date().getFullYear();

  useEffect(() => {
    loadCatches().then(data => { setCatches(data); setLoading(false); });
  }, []);

  const seasonCatches = catches.filter(c => c.season === currentSeason);

  const addCatch = useCallback(() => {
    if (!form.length || isNaN(parseFloat(form.length)) || parseFloat(form.length) <= 0) {
      setFormError("Bitte eine gültige Länge eingeben.");
      return;
    }
    const water = useCustom ? customWater.trim() : form.water;
    if (!water) { setFormError("Bitte einen Fangort angeben."); return; }

    const newCatch = {
      id: Date.now(),
      species: selectedSpecies.id,
      length: parseFloat(form.length),
      water,
      weight: form.weight ? parseFloat(form.weight) : null,
      bait: form.bait || null,
      photo: formPhoto || null,
      date: new Date().toISOString(),
      season: currentSeason,
      angler: anglerName,
    };
    const updated = [newCatch, ...catches];
    setCatches(updated);
    saveCatches(updated);
    setShowForm(false);
    setForm({ length: "", water: ULTEN_WATERS[0], weight: "", bait: "" });
    setFormPhoto(null);
    setCustomWater("");
    setUseCustom(false);
    setFormError("");
  }, [form, catches, selectedSpecies, useCustom, customWater, currentSeason, formPhoto]);

  const getBestCatch = (speciesId) => {
    const base = anglerFilter === "all" ? seasonCatches : seasonCatches.filter(c => c.angler === anglerFilter);
    const sc = base.filter(c => c.species === speciesId);
    if (!sc.length) return null;
    return sc.reduce((best, c) => c.length > best.length ? c : best);
  };

  if (loading) return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#0d1117", color: "#c8a060", fontFamily: "Georgia, serif", fontSize: 20 }}>
      Lade Fangdaten…
    </div>
  );

  // Setup screen
  if (!anglerName) return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#0d1117,#0d1a2a)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, fontFamily: "Georgia,serif" }}>
      <div style={{ fontSize: 64, marginBottom: 20 }}>🎣</div>
      <div style={{ fontSize: 26, fontWeight: 700, color: "#e8d8b0", marginBottom: 6, fontFamily: "'Libre Baskerville',Georgia,serif", textAlign: "center" }}>Fangtagebuch</div>
      <div style={{ fontSize: 12, color: "#7a8898", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 40 }}>Fischerverein Ultental</div>
      <div style={{ background: "#161e28", borderRadius: 16, padding: 28, width: "100%", maxWidth: 340, border: "1px solid #2a3848" }}>
        <div style={{ fontSize: 15, color: "#c8d8e8", marginBottom: 6 }}>Wie heißt du?</div>
        <div style={{ fontSize: 12, color: "#5a6878", marginBottom: 16 }}>Dein Name wird bei jedem Fang gespeichert.</div>
        <input value={anglerInput} onChange={e => setAnglerInput(e.target.value)}
          onKeyDown={e => { if (e.key==="Enter" && anglerInput.trim()) { const n=anglerInput.trim(); localStorage.setItem("fischerei-angler",n); setAnglerName(n); }}}
          placeholder="z.B. Stefan" autoFocus
          style={{ width: "100%", background: "#0d1520", border: "1px solid #3a5070", borderRadius: 10, padding: "12px 14px", color: "#e8d8b0", fontSize: 16, fontFamily: "Georgia,serif", marginBottom: 16, outline: "none", display: "block" }}
        />
        <button onClick={() => { if (anglerInput.trim()) { const n=anglerInput.trim(); localStorage.setItem("fischerei-angler",n); setAnglerName(n); }}}
          style={{ width: "100%", background: anglerInput.trim() ? "linear-gradient(135deg,#c8a060,#a07840)" : "#2a3848", border: "none", borderRadius: 10, padding: "13px 0", color: anglerInput.trim() ? "#0d1117" : "#5a6878", fontSize: 15, fontWeight: 700, cursor: anglerInput.trim() ? "pointer" : "default" }}>
          Los geht's →
        </button>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: "#0d1117", color: "#e8e0d0", fontFamily: "'Crimson Pro', Georgia, 'Times New Roman', serif", display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto", position: "relative" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; } 
        ::-webkit-scrollbar-track { background: #1a2030; }
        ::-webkit-scrollbar-thumb { background: #c8a060; border-radius: 2px; }
        input, select, textarea { outline: none; }
        button { cursor: pointer; }
        .fish-card:active { transform: scale(0.97); }
        .tab-btn { transition: all 0.2s; }
        .catch-row:hover { background: rgba(200,160,96,0.07) !important; }
      `}</style>

      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg, #0d1117 0%, #1a2030 100%)", borderBottom: "1px solid #2a3040", padding: "16px 20px 12px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {(view === "species" || (view === "grid" && showForm)) && (
            <button onClick={() => { setView("grid"); setShowForm(false); setSelectedSpecies(null); setFormError(""); }}
              style={{ background: "none", border: "none", color: "#c8a060", fontSize: 22, padding: "0 4px 0 0", lineHeight: 1 }}>←</button>
          )}
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: "#7a8898", letterSpacing: "0.15em", textTransform: "uppercase", fontFamily: "Georgia, serif", cursor: "pointer" }} title="Tippen um Namen zu ändern" onClick={() => { const n=prompt("Dein Name:",anglerName); if(n&&n.trim()){localStorage.setItem("fischerei-angler",n.trim());setAnglerName(n.trim());} }}>
              👤 {anglerName} · {currentSeason}
            </div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "#e8d8b0", lineHeight: 1.2, fontFamily: "'Libre Baskerville', Georgia, serif" }}>
              {view === "species" ? selectedSpecies?.name : view === "stats" ? "Statistiken" : "Fangtagebuch"}
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {/* GRAFIK TOGGLE */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
              <span style={{ fontSize: 9, color: ultraRealistic ? "#c8a060" : "#4a6070", letterSpacing: "0.1em", fontFamily: "Georgia, serif", textTransform: "uppercase", transition: "color 0.3s" }}>Grafik</span>
              <div onClick={() => setUltraRealistic(v => !v)} style={{
                width: 40, height: 22, borderRadius: 11, cursor: "pointer", position: "relative",
                background: ultraRealistic ? "linear-gradient(135deg, #c8a060, #a07840)" : "#2a3040",
                border: `1px solid ${ultraRealistic ? "#c8a060" : "#3a4858"}`,
                transition: "all 0.3s", boxShadow: ultraRealistic ? "0 0 8px #c8a06066" : "none"
              }}>
                <div style={{
                  position: "absolute", top: 2, left: ultraRealistic ? 19 : 2,
                  width: 16, height: 16, borderRadius: 8,
                  background: ultraRealistic ? "#0d1117" : "#6a8898",
                  transition: "left 0.3s", boxShadow: "0 1px 3px rgba(0,0,0,0.4)"
                }}/>
              </div>
            </div>
            {view === "species" && (
              <button onClick={() => setShowForm(true)} style={{
                background: "linear-gradient(135deg, #c8a060, #a07840)", border: "none", color: "#0d1117",
                borderRadius: 20, padding: "7px 16px", fontWeight: 700, fontSize: 13,
                fontFamily: "'Crimson Pro', Georgia, serif", letterSpacing: "0.05em"
              }}>+ Eintrag</button>
            )}
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 70 }}>

        {/* GRID VIEW */}
        {view === "grid" && (
          <div style={{ padding: "16px 12px" }}>
            {(() => {
              const allAnglers = [...new Set(catches.map(c=>c.angler).filter(Boolean))];
              if (allAnglers.length < 2) return null;
              return <div style={{ display:"flex", gap:8, marginBottom:14, overflowX:"auto" }}>
                {["all",...allAnglers].map(a=>(
                  <button key={a} onClick={()=>setAnglerFilter(a)} style={{ flexShrink:0, background: anglerFilter===a ? "linear-gradient(135deg,#c8a060,#a07840)" : "#161e28", border: anglerFilter===a ? "none" : "1px solid #2a3848", borderRadius:20, padding:"6px 16px", color: anglerFilter===a ? "#0d1117" : "#8898a8", fontSize:12, fontWeight: anglerFilter===a?700:400, cursor:"pointer", fontFamily:"Georgia,serif" }}>
                    {a==="all" ? "🎣 Alle" : "👤 "+a}
                  </button>
                ))}
              </div>;
            })()}
            <div style={{ fontSize: 12, color: "#7a8898", marginBottom: 12, textAlign: "center", letterSpacing: "0.08em" }}>
              {seasonCatches.length} Fische gefangen · Saison {currentSeason}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {FISH_SPECIES.map(fish => {
                const best = getBestCatch(fish.id);
                const status = best ? getStatus(fish, best.length) : null;
                const cfg = status ? STATUS_CONFIG[status] : null;
                return (
                  <div key={fish.id} className="fish-card" onClick={() => { setSelectedSpecies(fish); setView("species"); }}
                    style={{
                      background: "linear-gradient(160deg, #161e28 0%, #1a2535 100%)",
                      border: `1px solid ${cfg ? cfg.borderColor + "66" : "#2a3040"}`,
                      borderRadius: 12, padding: "12px 10px", cursor: "pointer",
                      transition: "all 0.2s", position: "relative", overflow: "hidden"
                    }}>
                    {cfg && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: cfg.borderColor, borderRadius: "12px 12px 0 0" }}/>}
                    <div style={{ display: "flex", justifyContent: "center", marginBottom: 6 }}>
                      {ultraRealistic ? <FishUltra type={fish.svgType} size={110} /> : <FishSVG type={fish.svgType} size={110} />}
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#e8d8b0", lineHeight: 1.2, fontFamily: "'Libre Baskerville', Georgia, serif", marginBottom: 2 }}>
                      {fish.name}
                    </div>
                    <div style={{ fontSize: 10, color: "#6a7888", fontStyle: "italic", marginBottom: 6 }}>{fish.latin}</div>
                    {best ? (
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        <div style={{ fontSize: 15, fontWeight: 700, color: cfg.text }}>
                          {best.length} cm {best.weight ? `· ${best.weight} kg` : ""}
                        </div>
                        <StatusBadge status={status} />
                      </div>
                    ) : (
                      <div style={{ fontSize: 11, color: "#4a5868", fontStyle: "italic" }}>Noch kein Fang</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* SPECIES VIEW */}
        {view === "species" && selectedSpecies && (
          <div style={{ padding: "0 0 16px" }}>
            {/* Fish hero */}
            <div style={{ background: "linear-gradient(160deg, #161e28, #1a2535)", borderBottom: "1px solid #2a3040", padding: "20px", display: "flex", alignItems: "center", gap: 16 }}>
              {ultraRealistic ? <FishUltra type={selectedSpecies.svgType} size={130} /> : <FishSVG type={selectedSpecies.svgType} size={130} />}
              <div>
                <div style={{ fontSize: 11, color: "#7a8898", letterSpacing: "0.1em", textTransform: "uppercase" }}>Maße (cm)</div>
                {[
                  { label: "UM", range: `bis ${selectedSpecies.um}`, cfg: STATUS_CONFIG.UM },
                  { label: "NM", range: `${selectedSpecies.um}–${selectedSpecies.nm}`, cfg: STATUS_CONFIG.NM },
                  { label: "TR", range: `${selectedSpecies.nm}–${selectedSpecies.tr}`, cfg: STATUS_CONFIG.TR },
                  { label: "ST", range: `${selectedSpecies.tr}+`, cfg: STATUS_CONFIG.ST },
                ].map(r => (
                  <div key={r.label} style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 3 }}>
                    <span style={{ fontSize: 10, fontWeight: 700, color: r.cfg.text, background: r.cfg.bg, padding: "1px 6px", borderRadius: 10, border: `1px solid ${r.cfg.borderColor}` }}>{r.label}</span>
                    <span style={{ fontSize: 12, color: "#a0b0c0" }}>{r.range} cm</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Catches list */}
            <div style={{ padding: "16px 16px 0" }}>
              <div style={{ fontSize: 13, color: "#7a8898", letterSpacing: "0.08em", marginBottom: 10, fontFamily: "Georgia, serif" }}>
                {seasonCatches.filter(c => c.species === selectedSpecies.id).length} Einträge · Saison {currentSeason}
              </div>
              {seasonCatches.filter(c => c.species === selectedSpecies.id).length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 20px", color: "#4a5868", fontSize: 14, fontStyle: "italic" }}>
                  Noch keine Fänge eingetragen.<br/>
                  <span style={{ fontSize: 12 }}>Tippe auf „+ Eintrag" um loszulegen.</span>
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {seasonCatches.filter(c => c.species === selectedSpecies.id)
                    .sort((a, b) => b.length - a.length)
                    .map(c => {
                      const st = getStatus(selectedSpecies, c.length);
                      const cfg = STATUS_CONFIG[st];
                      return (
                        <div key={c.id} className="catch-row" style={{
                          background: "#161e28", borderRadius: 10, padding: "12px 14px",
                          border: `1px solid ${cfg.borderColor}33`, display: "flex", alignItems: "center", gap: 12
                        }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                              <span style={{ fontSize: 18, fontWeight: 700, color: cfg.text }}>{c.length} cm</span>
                              {c.weight && <span style={{ fontSize: 12, color: "#7a9898" }}>{c.weight} kg</span>}
                              <StatusBadge status={st} />
                            </div>
                            <div style={{ fontSize: 12, color: "#7a8898" }}>
                              📍 {c.water}
                              {c.bait && <span style={{ marginLeft: 8 }}>🪝 {c.bait}</span>}
                            </div>
                            <div style={{ fontSize: 11, color: "#4a5868", marginTop: 2 }}>
                              {new Date(c.date).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" })}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                </div>
              )}
            </div>
          </div>
        )}

        {/* STATS VIEW */}
        {view === "stats" && (
          <div style={{ padding: "16px" }}>
            <div style={{ fontSize: 12, color: "#7a8898", textAlign: "center", marginBottom: 16, letterSpacing: "0.08em" }}>
              Saison {currentSeason} · {seasonCatches.length} Fische total
            </div>

            {seasonCatches.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 20px", color: "#4a5868", fontSize: 14, fontStyle: "italic" }}>
                Noch keine Fangdaten vorhanden.
              </div>
            ) : (
              <>
                {/* Pie: Species */}
                <div style={{ background: "#161e28", borderRadius: 12, padding: 16, marginBottom: 12, border: "1px solid #2a3040" }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#e8d8b0", marginBottom: 12, fontFamily: "'Libre Baskerville', Georgia, serif" }}>Fischarten</div>
                  <ResponsiveContainer width="100%" height={200}>
                    <PieChart>
                      <Pie data={
                        FISH_SPECIES.map(f => ({ name: f.name, value: seasonCatches.filter(c => c.species === f.id).length, color: f.color }))
                          .filter(d => d.value > 0)
                      } cx="50%" cy="50%" outerRadius={75} dataKey="value" label={({ name, value }) => `${name.split(" ")[0]} (${value})`}
                        labelLine={{ stroke: "#5a6878" }}
                        style={{ fontSize: 9, fill: "#a0b0c0", fontFamily: "Georgia, serif" }}>
                        {FISH_SPECIES.map((f) => <Cell key={f.id} fill={f.color} />)}
                      </Pie>
                      <Tooltip contentStyle={{ background: "#1a2535", border: "1px solid #c8a060", borderRadius: 8, color: "#e8d8b0", fontFamily: "Georgia, serif", fontSize: 12 }} />
                    </PieChart>
                  </ResponsiveContainer>
                </div>

                {/* Pie: Waters */}
                <div style={{ background: "#161e28", borderRadius: 12, padding: 16, marginBottom: 12, border: "1px solid #2a3040" }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#e8d8b0", marginBottom: 12, fontFamily: "'Libre Baskerville', Georgia, serif" }}>Gewässer</div>
                  {(() => {
                    const waterCounts = {};
                    seasonCatches.forEach(c => { waterCounts[c.water] = (waterCounts[c.water] || 0) + 1; });
                    const waterData = Object.entries(waterCounts).map(([name, value], i) => ({ name, value, color: `hsl(${200 + i * 28}, 45%, ${45 + i * 4}%)` }));
                    return (
                      <ResponsiveContainer width="100%" height={200}>
                        <PieChart>
                          <Pie data={waterData} cx="50%" cy="50%" outerRadius={75} dataKey="value"
                            label={({ name, value }) => `${name.split(" ")[0]} (${value})`}
                            labelLine={{ stroke: "#5a6878" }}
                            style={{ fontSize: 9, fill: "#a0b0c0", fontFamily: "Georgia, serif" }}>
                            {waterData.map((d, i) => <Cell key={i} fill={d.color} />)}
                          </Pie>
                          <Tooltip contentStyle={{ background: "#1a2535", border: "1px solid #c8a060", borderRadius: 8, color: "#e8d8b0", fontFamily: "Georgia, serif", fontSize: 12 }} />
                        </PieChart>
                      </ResponsiveContainer>
                    );
                  })()}
                </div>

                {/* Line: Size distribution */}
                <div style={{ background: "#161e28", borderRadius: 12, padding: 16, border: "1px solid #2a3040" }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#e8d8b0", marginBottom: 8, fontFamily: "'Libre Baskerville', Georgia, serif" }}>Größenverteilung (5cm-Schritte)</div>
                  <div style={{ marginBottom: 12 }}>
                    <select value={statsFilter} onChange={e => setStatsFilter(e.target.value)}
                      style={{ background: "#0d1117", border: "1px solid #3a4858", color: "#c8d8e8", borderRadius: 8, padding: "6px 10px", fontSize: 12, width: "100%", fontFamily: "Georgia, serif" }}>
                      <option value="all">Alle Fischarten</option>
                      {FISH_SPECIES.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                    </select>
                  </div>
                  {(() => {
                    const filtered = statsFilter === "all" ? seasonCatches : seasonCatches.filter(c => c.species === statsFilter);
                    if (!filtered.length) return <div style={{ textAlign: "center", color: "#4a5868", fontSize: 13, padding: "20px 0" }}>Keine Daten</div>;
                    const maxLen = Math.max(...filtered.map(c => c.length));
                    const buckets = {};
                    for (let i = 0; i <= Math.ceil(maxLen / 5) * 5; i += 5) {
                      buckets[i] = 0;
                    }
                    filtered.forEach(c => {
                      const b = Math.floor(c.length / 5) * 5;
                      buckets[b] = (buckets[b] || 0) + 1;
                    });
                    const chartData = Object.entries(buckets).map(([key, count]) => ({ range: `${key}–${parseInt(key) + 5}`, count }));
                    return (
                      <ResponsiveContainer width="100%" height={200}>
                        <LineChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                          <CartesianGrid strokeDasharray="3 3" stroke="#2a3040" />
                          <XAxis dataKey="range" tick={{ fill: "#7a8898", fontSize: 9, fontFamily: "Georgia, serif" }} />
                          <YAxis tick={{ fill: "#7a8898", fontSize: 10, fontFamily: "Georgia, serif" }} />
                          <Tooltip contentStyle={{ background: "#1a2535", border: "1px solid #c8a060", borderRadius: 8, color: "#e8d8b0", fontFamily: "Georgia, serif", fontSize: 12 }} />
                          <Line type="monotone" dataKey="count" stroke="#c8a060" strokeWidth={2.5} dot={{ fill: "#c8a060", r: 4, strokeWidth: 0 }} activeDot={{ r: 6 }} name="Fische" />
                        </LineChart>
                      </ResponsiveContainer>
                    );
                  })()}
                </div>
              </>
            )}
          </div>
        )}
      </div>

      {/* ADD CATCH MODAL */}
      {showForm && selectedSpecies && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 200, display: "flex", alignItems: "flex-end", maxWidth: 480, margin: "0 auto" }}
          onClick={e => { if (e.target === e.currentTarget) { setShowForm(false); setFormError(""); } }}>
          <div style={{ background: "#161e28", borderRadius: "16px 16px 0 0", padding: "24px 20px 32px", width: "100%", border: "1px solid #2a3840", borderBottom: "none" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 17, fontWeight: 700, color: "#e8d8b0", fontFamily: "'Libre Baskerville', Georgia, serif" }}>Neuer Fang</div>
                <div style={{ fontSize: 12, color: "#7a8898", fontStyle: "italic" }}>{selectedSpecies.name}</div>
              </div>
              <button onClick={() => { setShowForm(false); setFormError(""); }} style={{ background: "#2a3040", border: "none", color: "#a0b0c0", borderRadius: 20, width: 32, height: 32, fontSize: 16 }}>✕</button>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div>
                <label style={{ fontSize: 12, color: "#c8a060", letterSpacing: "0.08em", display: "block", marginBottom: 6, fontFamily: "Georgia, serif" }}>LÄNGE (cm) *</label>
                <input type="number" placeholder="z.B. 42" value={form.length}
                  onChange={e => setForm({ ...form, length: e.target.value })}
                  style={{ width: "100%", background: "#0d1117", border: "1px solid #3a4858", color: "#e8d8b0", borderRadius: 8, padding: "10px 14px", fontSize: 16, fontFamily: "'Crimson Pro', Georgia, serif" }} />
              </div>

              <div>
                <label style={{ fontSize: 12, color: "#c8a060", letterSpacing: "0.08em", display: "block", marginBottom: 6, fontFamily: "Georgia, serif" }}>FANGORT *</label>
                <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  <button onClick={() => setUseCustom(false)} style={{ flex: 1, padding: "7px", borderRadius: 8, border: `1px solid ${!useCustom ? "#c8a060" : "#3a4858"}`, background: !useCustom ? "#c8a06022" : "#0d1117", color: !useCustom ? "#c8a060" : "#7a8898", fontSize: 12, fontFamily: "Georgia, serif" }}>Ulten-Gewässer</button>
                  <button onClick={() => setUseCustom(true)} style={{ flex: 1, padding: "7px", borderRadius: 8, border: `1px solid ${useCustom ? "#c8a060" : "#3a4858"}`, background: useCustom ? "#c8a06022" : "#0d1117", color: useCustom ? "#c8a060" : "#7a8898", fontSize: 12, fontFamily: "Georgia, serif" }}>Custom</button>
                </div>
                {!useCustom ? (
                  <select value={form.water} onChange={e => setForm({ ...form, water: e.target.value })}
                    style={{ width: "100%", background: "#0d1117", border: "1px solid #3a4858", color: "#e8d8b0", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "'Crimson Pro', Georgia, serif" }}>
                    {ULTEN_WATERS.map(w => <option key={w} value={w}>{w}</option>)}
                  </select>
                ) : (
                  <input type="text" placeholder="Gewässername eingeben…" value={customWater}
                    onChange={e => setCustomWater(e.target.value)}
                    style={{ width: "100%", background: "#0d1117", border: "1px solid #3a4858", color: "#e8d8b0", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "'Crimson Pro', Georgia, serif" }} />
                )}
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>
                  <label style={{ fontSize: 12, color: "#7a8898", letterSpacing: "0.08em", display: "block", marginBottom: 6, fontFamily: "Georgia, serif" }}>GEWICHT (kg)</label>
                  <input type="number" placeholder="Optional" value={form.weight}
                    onChange={e => setForm({ ...form, weight: e.target.value })}
                    step="0.01"
                    style={{ width: "100%", background: "#0d1117", border: "1px solid #3a4858", color: "#e8d8b0", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "'Crimson Pro', Georgia, serif" }} />
                </div>
                <div>
                  <label style={{ fontSize: 12, color: "#7a8898", letterSpacing: "0.08em", display: "block", marginBottom: 6, fontFamily: "Georgia, serif" }}>KÖDER</label>
                  <input type="text" placeholder="Optional" value={form.bait}
                    onChange={e => setForm({ ...form, bait: e.target.value })}
                    style={{ width: "100%", background: "#0d1117", border: "1px solid #3a4858", color: "#e8d8b0", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontFamily: "'Crimson Pro', Georgia, serif" }} />
                </div>
              </div>

              {/* PHOTO UPLOAD */}
              <div>
                <label style={{ fontSize: 12, color: "#7a8898", letterSpacing: "0.08em", display: "block", marginBottom: 6, fontFamily: "Georgia, serif" }}>FOTO</label>
                {formPhoto ? (
                  <div style={{ position: "relative" }}>
                    <img src={formPhoto} alt="Fang" style={{ width: "100%", height: 160, objectFit: "cover", borderRadius: 10, border: "1px solid #3a4858" }}/>
                    <button onClick={() => setFormPhoto(null)} style={{
                      position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.7)", border: "none",
                      color: "white", borderRadius: 20, width: 28, height: 28, fontSize: 14, cursor: "pointer"
                    }}>✕</button>
                  </div>
                ) : (
                  <label style={{
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
                    background: "#0d1117", border: "2px dashed #3a4858", borderRadius: 10,
                    padding: "20px", cursor: "pointer", color: "#5a7080", fontSize: 13,
                    fontFamily: "Georgia, serif", transition: "all 0.2s"
                  }}>
                    <span style={{ fontSize: 24 }}>📷</span>
                    <span>Foto auswählen</span>
                    <input type="file" accept="image/*" style={{ display: "none" }}
                      onChange={e => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = ev => setFormPhoto(ev.target.result);
                        reader.readAsDataURL(file);
                      }}/>
                  </label>
                )}
              </div>

              {formError && <div style={{ color: "#f87171", fontSize: 12, textAlign: "center" }}>{formError}</div>}

              <button onClick={addCatch} style={{
                background: "linear-gradient(135deg, #c8a060, #a07840)", border: "none", color: "#0d1117",
                borderRadius: 12, padding: "13px", fontWeight: 700, fontSize: 16, marginTop: 4,
                fontFamily: "'Libre Baskerville', Georgia, serif", letterSpacing: "0.05em"
              }}>Fang eintragen</button>
            </div>
          </div>
        </div>
      )}

      {/* GALLERY VIEW */}
      {view === "gallery" && (() => {
        // compute available seasons
        const allSeasons = [...new Set(catches.map(c => c.season))].sort((a,b) => b-a);
        const gf = galleryFilter;
        let filtered = catches.filter(c => {
          if (gf.species !== "all" && c.species !== gf.species) return false;
          if (gf.season !== "all" && c.season !== parseInt(gf.season)) return false;
          if (gf.minLen && c.length < parseFloat(gf.minLen)) return false;
          if (gf.maxLen && c.length > parseFloat(gf.maxLen)) return false;
          return true;
        });
        // sort
        if (gf.sort === "biggest") filtered = [...filtered].sort((a,b) => b.length - a.length);
        else if (gf.sort === "smallest") filtered = [...filtered].sort((a,b) => a.length - b.length);
        else if (gf.sort === "oldest") filtered = [...filtered].sort((a,b) => new Date(a.date)-new Date(b.date));
        else filtered = [...filtered].sort((a,b) => new Date(b.date)-new Date(a.date));

        const withPhoto = filtered.filter(c => c.photo);
        const allFiltered = filtered;

        // season list: 2026 → current year + 4, always ascending
        const seasonList = [];
        for (let y = 2026; y <= Math.max(currentSeason + 4, 2030); y++) seasonList.push(y);

        return (
          <div style={{ position: "fixed", inset: 0, top: 72, bottom: 58, maxWidth: 480, margin: "0 auto", overflowY: "auto", background: "#0d1117" }}>
            {/* Filter bar – sticky inside the scrollable area, below the app header */}
            <div style={{ background: "#0d1117", borderBottom: "1px solid #2a3040", padding: "10px 14px 12px", position: "sticky", top: 0, zIndex: 50 }}>
              <div style={{ fontSize: 11, color: "#c8a060", letterSpacing: "0.12em", textTransform: "uppercase", fontFamily: "Georgia, serif", marginBottom: 8 }}>
                Galerie · {withPhoto.length} Fotos · {allFiltered.length} Fänge
              </div>
              {/* Row 1: Species + Season */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 7 }}>
                <select value={gf.species} onChange={e => setGalleryFilter(f=>({...f, species: e.target.value}))}
                  style={{ background: "#161e28", border: "1px solid #3a4858", color: "#c8d8e8", borderRadius: 8, padding: "7px 10px", fontSize: 11, fontFamily: "Georgia, serif" }}>
                  <option value="all">Alle Arten</option>
                  {FISH_SPECIES.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                </select>
                <select value={gf.season} onChange={e => setGalleryFilter(f=>({...f, season: e.target.value}))}
                  style={{ background: "#161e28", border: "1px solid #3a4858", color: "#c8d8e8", borderRadius: 8, padding: "7px 10px", fontSize: 11, fontFamily: "Georgia, serif" }}>
                  <option value="all">Alle Saisons</option>
                  {seasonList.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
              </div>
              {/* Row 2: Min/max size + sort */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1.4fr", gap: 8 }}>
                <input type="number" placeholder="Min cm" value={gf.minLen}
                  onChange={e => setGalleryFilter(f=>({...f, minLen: e.target.value}))}
                  style={{ background: "#161e28", border: "1px solid #3a4858", color: "#c8d8e8", borderRadius: 8, padding: "7px 10px", fontSize: 11, fontFamily: "Georgia, serif" }}/>
                <input type="number" placeholder="Max cm" value={gf.maxLen}
                  onChange={e => setGalleryFilter(f=>({...f, maxLen: e.target.value}))}
                  style={{ background: "#161e28", border: "1px solid #3a4858", color: "#c8d8e8", borderRadius: 8, padding: "7px 10px", fontSize: 11, fontFamily: "Georgia, serif" }}/>
                <select value={gf.sort} onChange={e => setGalleryFilter(f=>({...f, sort: e.target.value}))}
                  style={{ background: "#161e28", border: "1px solid #3a4858", color: "#c8d8e8", borderRadius: 8, padding: "7px 10px", fontSize: 11, fontFamily: "Georgia, serif" }}>
                  <option value="newest">Neueste zuerst</option>
                  <option value="oldest">Älteste zuerst</option>
                  <option value="biggest">Größte zuerst</option>
                  <option value="smallest">Kleinste zuerst</option>
                </select>
              </div>
            </div>

            {/* Photo grid */}
            <div style={{ padding: "12px" }}>
              {withPhoto.length === 0 ? (
                <div style={{ textAlign: "center", padding: "60px 20px", color: "#4a5868" }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>📷</div>
                  <div style={{ fontSize: 14, fontStyle: "italic", fontFamily: "Georgia, serif" }}>
                    {allFiltered.length === 0 ? "Keine Fänge mit diesen Filtern." : "Keine Fotos vorhanden. Füge beim Eintragen ein Foto hinzu!"}
                  </div>
                </div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {withPhoto.map(c => {
                    const fish = FISH_SPECIES.find(f => f.id === c.species);
                    const status = getStatus(fish, c.length);
                    const cfg = STATUS_CONFIG[status];
                    return (
                      <div key={c.id} onClick={() => setLightboxPhoto({src: c.photo, catch: c})}
                        style={{ borderRadius: 12, overflow: "hidden", border: `1px solid ${cfg.borderColor}55`, cursor: "pointer", position: "relative", background: "#161e28" }}>
                        <img src={c.photo} alt={fish?.name} style={{ width: "100%", height: 130, objectFit: "cover", display: "block" }}/>
                        {/* overlay info */}
                        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "linear-gradient(transparent, rgba(0,0,0,0.82))", padding: "20px 10px 8px" }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: cfg.text }}>{c.length} cm {c.weight ? `· ${c.weight}kg` : ""}</div>
                          <div style={{ fontSize: 10, color: "#a0b0c0", marginTop: 1 }}>{fish?.name}</div>
                          <div style={{ fontSize: 9, color: "#6a7888" }}>{new Date(c.date).toLocaleDateString("de-DE")}</div>
                        </div>
                        {/* status top badge */}
                        <div style={{ position: "absolute", top: 8, right: 8, background: cfg.bg, border: `1px solid ${cfg.borderColor}`, borderRadius: 10, padding: "2px 7px", fontSize: 9, fontWeight: 700, color: cfg.text }}>{status}</div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* catches without photo – compact list */}
              {allFiltered.filter(c => !c.photo).length > 0 && (
                <div style={{ marginTop: 16 }}>
                  <div style={{ fontSize: 10, color: "#4a5868", letterSpacing: "0.12em", textTransform: "uppercase", fontFamily: "Georgia, serif", marginBottom: 8 }}>
                    Fänge ohne Foto ({allFiltered.filter(c=>!c.photo).length})
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {allFiltered.filter(c => !c.photo).map(c => {
                      const fish = FISH_SPECIES.find(f => f.id === c.species);
                      const status = getStatus(fish, c.length);
                      const cfg = STATUS_CONFIG[status];
                      return (
                        <div key={c.id} style={{ background: "#161e28", borderRadius: 8, padding: "10px 12px", border: `1px solid ${cfg.borderColor}33`, display: "flex", alignItems: "center", gap: 10 }}>
                          <div style={{ flex: 1 }}>
                            <span style={{ fontSize: 14, fontWeight: 700, color: cfg.text }}>{c.length} cm</span>
                            {c.weight && <span style={{ fontSize: 11, color: "#7a9898", marginLeft: 6 }}>{c.weight} kg</span>}
                            <span style={{ fontSize: 11, color: "#6a7888", marginLeft: 8 }}>{fish?.name}</span>
                          </div>
                          <div style={{ fontSize: 10, color: "#4a5868" }}>{new Date(c.date).toLocaleDateString("de-DE")}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* LIGHTBOX */}
      {lightboxPhoto && (
        <div onClick={() => setLightboxPhoto(null)} style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", zIndex: 500,
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          maxWidth: 480, margin: "0 auto", padding: 20
        }}>
          <img src={lightboxPhoto.src} alt="Fang" style={{ width: "100%", maxHeight: "65vh", objectFit: "contain", borderRadius: 12 }}/>
          {(() => {
            const c = lightboxPhoto.catch;
            const fish = FISH_SPECIES.find(f => f.id === c.species);
            const status = getStatus(fish, c.length);
            const cfg = STATUS_CONFIG[status];
            return (
              <div style={{ marginTop: 16, textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: cfg.text, fontFamily: "'Libre Baskerville', Georgia, serif" }}>
                  {fish?.name} · {c.length} cm {c.weight ? `· ${c.weight} kg` : ""}
                </div>
                <div style={{ fontSize: 13, color: "#7a8898", marginTop: 4 }}>
                  📍 {c.water} {c.bait ? `· 🪝 ${c.bait}` : ""}
                </div>
                <div style={{ fontSize: 12, color: "#4a5868", marginTop: 2 }}>
                  {new Date(c.date).toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit", year:"numeric" })} · Saison {c.season}
                </div>
                <StatusBadge status={status} large />
              </div>
            );
          })()}
          <div style={{ marginTop: 20, fontSize: 12, color: "#4a5868" }}>Tippen zum Schließen</div>
        </div>
      )}

      {/* BOTTOM TABS */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "#0d1117", borderTop: "1px solid #2a3040", display: "flex", zIndex: 100 }}>
        {[
          { key: "grid", label: "Übersicht", icon: "⊞" },
          { key: "gallery", label: "Galerie", icon: "◫" },
          { key: "stats", label: "Statistiken", icon: "◉" },
        ].map(tab => (
          <button key={tab.key} className="tab-btn" onClick={() => { setView(tab.key); setShowForm(false); }}
            style={{
              flex: 1, padding: "12px 8px 14px", background: "none", border: "none",
              color: (view === tab.key || (view === "species" && tab.key === "grid")) ? "#c8a060" : "#4a6070",
              fontSize: 10, fontFamily: "'Crimson Pro', Georgia, serif", letterSpacing: "0.1em",
              textTransform: "uppercase", display: "flex", flexDirection: "column", alignItems: "center", gap: 3
            }}>
            <span style={{ fontSize: 20 }}>{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </div>
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById("root"));
domRoot.render(React.createElement(App));

  </script>
</body>
</html>
